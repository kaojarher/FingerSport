<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空中書法練習</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #111; font-family: "標楷體", "DFKai-SB", serif; }
        video { display: none; }

        #output_canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
        }

        /* 上方 HUD */
        #hud {
            position: fixed; top: 0; left: 0; right: 0;
            padding: 16px 28px;
            display: flex; align-items: center; justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            pointer-events: none; z-index: 20;
        }
        #hud .title {
            font-size: 28px; font-weight: bold;
            color: #ffeb3b;
            text-shadow: 0 0 12px rgba(0,0,0,0.9), 2px 2px 0 #000;
        }
        #hud .info {
            font-size: 22px; font-weight: bold;
            color: #ffeb3b;
            text-shadow: 0 0 12px rgba(0,0,0,0.9), 2px 2px 0 #000;
            text-align: right;
        }

        /* 底部狀態列 */
        #statusBar {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 14px 28px;
            display: flex; align-items: center; justify-content: space-between;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            pointer-events: none; z-index: 20;
        }
        #statusBar .hint {
            font-size: 18px; font-weight: bold;
            color: #ffeb3b;
            text-shadow: 2px 2px 0 #000;
        }

        /* 蓋章動畫 */
        #stamp {
            position: fixed; right: 10%; bottom: 20%;
            width: 130px; height: 130px;
            border: 5px solid #b22222; border-radius: 8px;
            color: #b22222; font-size: 44px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; opacity: 0; z-index: 30;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: rotate(-15deg) scale(2);
            pointer-events: none;
        }
        #stamp.active { opacity: 0.85; transform: rotate(-15deg) scale(1); }

        /* 載入遮罩 */
        #loading {
            position: fixed; inset: 0; background: rgba(10,5,0,0.97);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 20px;
            z-index: 100;
        }
        #loading.hidden { display: none; }
        #loading .ltitle {
            font-size: 36px; font-weight: bold; color: #ffeb3b;
            text-shadow: 0 0 20px #ff8800;
        }
        #loading .lmsg { font-size: 18px; color: #ccc; }
        .spinner {
            width: 56px; height: 56px;
            border: 6px solid #442200;
            border-top-color: #ffeb3b;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- 載入遮罩 -->
<div id="loading">
    <div class="spinner"></div>
    <div class="ltitle">空中書法練習</div>
    <div class="lmsg" id="loadMsg">正在啟動攝影機⋯⋯</div>
</div>

<!-- HUD -->
<div id="hud">
    <div class="title">✍️ 空中書法練習</div>
    <div class="info">
        第 <span id="levelNum">1</span> 關：<span id="poemTitle">—</span><br>
        <span style="font-size:18px;">得分 <span id="scoreVal">0</span></span>
    </div>
</div>

<!-- 底部狀態 -->
<div id="statusBar">
    <div class="hint" id="statusHint">✋ 請將手放入畫面</div>
    <div class="hint">食指伸直書寫・握拳停筆</div>
</div>

<!-- 蓋章 -->
<div id="stamp">御筆</div>

<video id="input_video" playsinline></video>
<canvas id="output_canvas"></canvas>

<script>
// ═══════════════════════════════════════
// 詩詞資料
// ═══════════════════════════════════════
const poems = [
  { title: "鹿柴",     lines: ["空山不見人", "但聞人語響", "返景入深林", "復照青苔上"] },
  { title: "竹里館",   lines: ["獨坐幽篁裡", "彈琴復長嘯", "深林人不知", "明月來相照"] },
  { title: "相思",     lines: ["紅豆生南國", "春來發幾枝", "願君多采擷", "此物最相思"] },
  { title: "春曉",     lines: ["春眠不覺曉", "處處聞啼鳥", "夜來風雨聲", "花落知多少"] },
  { title: "夜思",     lines: ["床前明月光", "疑是地上霜", "舉頭望明月", "低頭思故鄉"] },
  { title: "登鸛雀樓", lines: ["白日依山盡", "黃河入海流", "欲窮千里目", "更上一層樓"] },
  { title: "江雪",     lines: ["千山鳥飛絕", "萬徑人蹤滅", "孤舟簑笠翁", "獨釣寒江雪"] },
  { title: "出塞",     lines: ["秦時明月漢時關", "萬里長征人未還", "但使龍城飛將在", "不教胡馬渡陰山"] },
  { title: "楓橋夜泊", lines: ["月落烏啼霜滿天", "江楓漁火對愁眠", "姑蘇城外寒山寺", "夜半鐘聲到客船"] },
  { title: "春望",     lines: ["國破山河在", "城春草木深", "感時花濺淚", "恨別鳥驚心", "烽火連三月", "家書抵萬金"] },
  { title: "登高",     lines: ["風急天高猿嘯哀", "渚清沙白鳥飛迴", "無邊落木蕭蕭下", "不盡長江滾滾來"] },
  { title: "山居秋暝", lines: ["空山新雨後", "天氣晚來秋", "明月松間照", "清泉石上流"] },
];

// ═══════════════════════════════════════
// DOM & 狀態
// ═══════════════════════════════════════
const videoEl     = document.getElementById('input_video');
const canvas      = document.getElementById('output_canvas');
const ctx         = canvas.getContext('2d');
const scoreEl     = document.getElementById('scoreVal');
const levelNumEl  = document.getElementById('levelNum');
const poemTitleEl = document.getElementById('poemTitle');
const statusEl    = document.getElementById('statusHint');
const loadingEl   = document.getElementById('loading');
const loadMsgEl   = document.getElementById('loadMsg');
const stampEl     = document.getElementById('stamp');

let level  = parseInt(localStorage.getItem('airCalliLevel')) || 0;
let score  = parseInt(localStorage.getItem('airCalliScore')) || 0;

let isDrawing = false;
let lastX = 0, lastY = 0;
let strokeCanvas, strokeCtx;
let btnDebounce = false;

// 虛擬按鈕（canvas 內繪製 + 碰撞，座標為正規化 0~1）
const BTN_CLEAR = { label: '🗑 清空',  x: 0.04, y: 0.80, w: 0.18, h: 0.10, color: 'rgba(100,50,0,0.82)' };
const BTN_NEXT  = { label: '✅ 下一關', x: 0.78, y: 0.80, w: 0.18, h: 0.10, color: 'rgba(140,15,15,0.82)' };

// ═══════════════════════════════════════
// 畫布 & 筆跡層初始化
// ═══════════════════════════════════════
function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    // 筆跡層同步更新尺寸
    if (!strokeCanvas) strokeCanvas = document.createElement('canvas');
    strokeCanvas.width  = canvas.width;
    strokeCanvas.height = canvas.height;
    strokeCtx = strokeCanvas.getContext('2d');
    strokeCtx.lineCap     = 'round';
    strokeCtx.lineJoin    = 'round';
    strokeCtx.strokeStyle = '#1a1209';
    strokeCtx.lineWidth   = 8;
}
window.addEventListener('resize', () => { resizeCanvas(); });
resizeCanvas();

// ═══════════════════════════════════════
// HUD 更新
// ═══════════════════════════════════════
function updateHUD() {
    const p = poems[level % poems.length];
    levelNumEl.innerText  = level + 1;
    poemTitleEl.innerText = p.title;
    scoreEl.innerText     = score;
}

// ═══════════════════════════════════════
// 詩句底稿繪製（標楷體深灰色）
// ═══════════════════════════════════════
function drawPoemGuide() {
    const p = poems[level % poems.length];
    const W = canvas.width;
    const H = canvas.height;
    const lineCount  = p.lines.length;
    const maxLineLen = Math.max(...p.lines.map(l => l.length));

    // 字體大小：讓詩句佔畫面中央約 60% 高度
    const fontSize = Math.min(
        Math.floor((H * 0.60) / lineCount) - 10,
        Math.floor((W * 0.78) / maxLineLen) - 4,
        130
    );
    const lineH  = fontSize + 20;
    const totalH = lineCount * lineH;
    const startY = (H - totalH) / 2 + fontSize / 2 + 20;

    ctx.save();
    ctx.font         = `bold ${fontSize}px "標楷體", "DFKai-SB", "楷體", serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    p.lines.forEach((line, i) => {
        const cy = startY + i * lineH;

        // 白色光暈讓字在任何攝影機背景都看得清楚
        ctx.shadowColor   = 'rgba(255,255,255,0.9)';
        ctx.shadowBlur    = 18;
        ctx.lineWidth     = fontSize * 0.10;
        ctx.strokeStyle   = 'rgba(255,255,255,0.55)';
        ctx.strokeText(line, W / 2, cy);

        // 主體：深灰色，透明度高一點讓使用者看清楚要描的字
        ctx.shadowBlur  = 0;
        ctx.fillStyle   = 'rgba(50, 44, 38, 0.82)';
        ctx.fillText(line, W / 2, cy);
    });

    ctx.shadowBlur = 0;
    ctx.restore();
}

// ═══════════════════════════════════════
// 虛擬按鈕繪製
// ═══════════════════════════════════════
function drawButton(btn) {
    const W = canvas.width, H = canvas.height;
    const x = btn.x * W, y = btn.y * H;
    const w = btn.w * W, h = btn.h * H;
    ctx.save();
    ctx.fillStyle = btn.color;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, y, w, h, 14);
    else ctx.rect(x, y, w, h);
    ctx.fill();
    ctx.fillStyle    = '#ffeb3b';
    ctx.font         = `bold ${Math.floor(h * 0.40)}px "標楷體", "DFKai-SB", serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(btn.label, x + w / 2, y + h / 2);
    ctx.restore();
}

// ═══════════════════════════════════════
// 筆跡書寫
// ═══════════════════════════════════════
function drawStroke(x, y) {
    const dist = Math.hypot(x - lastX, y - lastY);
    strokeCtx.lineWidth = Math.max(5, 22 - dist * 0.4);
    strokeCtx.beginPath();
    strokeCtx.moveTo(lastX, lastY);
    strokeCtx.lineTo(x, y);
    strokeCtx.stroke();
    lastX = x; lastY = y;
}

function clearStrokes() {
    strokeCtx.clearRect(0, 0, strokeCanvas.width, strokeCanvas.height);
}

// ═══════════════════════════════════════
// 下一關
// ═══════════════════════════════════════
function nextLevel() {
    if (btnDebounce) return;
    btnDebounce = true;
    score += 50;
    stampEl.classList.add('active');
    setTimeout(() => {
        stampEl.classList.remove('active');
        level++;
        localStorage.setItem('airCalliLevel', level);
        localStorage.setItem('airCalliScore', score);
        updateHUD();
        clearStrokes();
        btnDebounce = false;
    }, 900);
}

// ═══════════════════════════════════════
// 按鈕碰撞（tipNX/tipNY 為鏡像補償後正規化座標）
// ═══════════════════════════════════════
function checkButtons(nx, ny) {
    const hit = btn => nx > btn.x && nx < btn.x + btn.w && ny > btn.y && ny < btn.y + btn.h;
    if (hit(BTN_CLEAR)) clearStrokes();
    if (hit(BTN_NEXT))  nextLevel();
}

// ═══════════════════════════════════════
// 每幀靜態畫面（攝影機未就緒時也能顯示詩句）
// ═══════════════════════════════════════
function drawStaticFrame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // 深色背景
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawPoemGuide();
    drawButton(BTN_CLEAR);
    drawButton(BTN_NEXT);
    ctx.drawImage(strokeCanvas, 0, 0);
}

// ═══════════════════════════════════════
// MediaPipe onResults
// ═══════════════════════════════════════
function onResults(results) {
    const W = canvas.width, H = canvas.height;

    ctx.save();
    ctx.clearRect(0, 0, W, H);

    // 鏡像翻轉：攝影機畫面 + 骨架一起翻，如照鏡子
    ctx.translate(W, 0);
    ctx.scale(-1, 1);

    // 1. 攝影機畫面（半透明）
    if (results.image) {
        ctx.globalAlpha = 0.42;
        ctx.drawImage(results.image, 0, 0, W, H);
        ctx.globalAlpha = 1;
    }

    // 2. 手部骨架偵測
    let handDetected = false;
    let tipNX = null, tipNY = null;

    if (results.multiHandLandmarks?.length > 0) {
        handDetected = true;
        const landmarks = results.multiHandLandmarks[0];

        drawConnectors(ctx, landmarks, HAND_CONNECTIONS, { color: '#00e676', lineWidth: 3 });
        drawLandmarks(ctx, landmarks, { color: '#ff1744', lineWidth: 1, radius: 4 });

        const tip   = landmarks[8];  // 食指指尖
        const base  = landmarks[5];  // 食指根部關節
        const thumb = landmarks[4];  // 拇指尖
        const mid   = landmarks[12]; // 中指尖

        // tip.x 是原始（未鏡像）座標
        // 畫面做了 scale(-1,1)，所以視覺位置是 1 - tip.x
        tipNX = 1 - tip.x;
        tipNY = tip.y;

        // 食指指尖高亮圈（在翻轉 ctx 裡，用原始 tip.x 才對齊骨架）
        ctx.beginPath();
        ctx.arc(tip.x * W, tip.y * H, 22, 0, Math.PI * 2);
        ctx.strokeStyle = '#ffeb3b';
        ctx.lineWidth   = 3;
        ctx.stroke();
        ctx.fillStyle   = 'rgba(255,235,59,0.22)';
        ctx.fill();

        // 書寫判斷：食指伸直（指尖高於根部）且非握拳
        const fingerUp = tip.y < base.y - 0.03;
        const notFist  = Math.hypot(thumb.x - mid.x, thumb.y - mid.y) > 0.08;
        const penDown  = fingerUp && notFist;

        if (penDown) {
            if (!isDrawing) { isDrawing = true; lastX = tipNX * W; lastY = tipNY * H; }
            drawStroke(tipNX * W, tipNY * H);
        } else {
            isDrawing = false;
        }
    } else {
        isDrawing = false;
    }

    ctx.restore(); // ← 回到未翻轉空間

    // 3. 詩句底稿（未翻轉，文字正向顯示）
    drawPoemGuide();

    // 4. 使用者筆跡
    ctx.drawImage(strokeCanvas, 0, 0);

    // 5. 虛擬按鈕
    drawButton(BTN_CLEAR);
    drawButton(BTN_NEXT);

    // 6. 按鈕碰撞
    if (tipNX !== null && !btnDebounce) checkButtons(tipNX, tipNY);

    // 7. 狀態文字
    statusEl.textContent = handDetected
        ? '✍️ 食指伸直書寫・握拳停筆'
        : '✋ 請將手放入畫面';
}

// ═══════════════════════════════════════
// 初始化
// ═══════════════════════════════════════
function init() {
    updateHUD();

    // 立刻顯示詩句（不等攝影機）
    drawStaticFrame();

    const hands = new Hands({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.65,
        minTrackingConfidence: 0.65
    });
    hands.onResults(onResults);

    // 攝影機啟動
    navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720, facingMode: 'user' } })
        .then(stream => {
            videoEl.srcObject = stream;
            videoEl.play();
            loadMsgEl.textContent = '正在載入手勢辨識模型⋯⋯';

            const camera = new Camera(videoEl, {
                onFrame: async () => {
                    // 攝影機第一幀 → 關閉遮罩
                    if (!loadingEl.classList.contains('hidden')) {
                        loadingEl.classList.add('hidden');
                    }
                    await hands.send({ image: videoEl });
                },
                width: 1280, height: 720
            });
            camera.start();
        })
        .catch(err => {
            loadMsgEl.textContent = '⚠️ 攝影機啟動失敗：' + err.message;
            // 攝影機失敗也繼續顯示詩句讓使用者看到
        });
}

window.onload = init;
</script>
</body>
</html>
