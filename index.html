<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>手指書法闖關</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #e8e4d9; font-family: "標楷體", "DFKai-SB", serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; }
        #game-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #input_video { display: none; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        .hud { position: absolute; top: 20px; width: 100%; text-align: center; color: #3e3a31; }
        .level-info {
            font-size: 32px; background: rgba(255,255,255,0.9);
            padding: 10px 30px; border-radius: 50px; border: 2px solid #8b4513;
        }
        #stamp {
            position: absolute; width: 120px; height: 120px;
            border: 4px solid #b22222; color: #b22222;
            font-size: 40px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            right: 10%; bottom: 20%; transform: rotate(-15deg) scale(2);
        }
        #stamp.active { opacity: 0.8; transform: rotate(-15deg) scale(1); }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(232,228,217,0.97); z-index: 200;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 16px;
            font-size: 22px; color: #5a4a3a;
        }
        #loading-overlay.hidden { display: none; }
        #loading-msg { font-size: 16px; color: #8b6a4a; }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #d4b896; border-top-color: #8b4513;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #cam-preview {
            position: fixed; bottom: 20px; right: 20px;
            width: 200px; height: 150px;
            border: 3px solid #8b4513; border-radius: 12px;
            overflow: hidden; z-index: 100; background: #111;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }
        #preview_video {
            display: block; width: 100%; height: 100%;
            object-fit: cover; transform: scaleX(-1);
        }
        #cam-label {
            position: absolute; top: 5px; left: 8px;
            font-size: 12px; color: rgba(255,255,255,0.85);
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
            pointer-events: none;
        }
        #hand-indicator {
            position: absolute; bottom: 5px; left: 0; width: 100%;
            text-align: center; font-size: 13px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
            transition: color 0.2s; color: #ffb347;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <div>空中書法闖關・宗師版</div>
    <div id="loading-msg">正在啟動攝影機與手勢辨識⋯⋯</div>
</div>

<div id="container">
    <div id="game-area">
        <video id="input_video" playsinline></video>
        <canvas id="bg_canvas"></canvas>
        <canvas id="draw_canvas"></canvas>
    </div>
    <div id="ui-layer">
        <div class="hud">
            <span class="level-info">第 <span id="levelNum">1</span> 關：<span id="poemTitle">載入中</span></span>
        </div>
        <div id="stamp">御筆</div>
    </div>
</div>

<div id="cam-preview">
    <video id="preview_video" autoplay playsinline muted></video>
    <span id="cam-label">📷 你的畫面</span>
    <div id="hand-indicator">✋ 未偵測到手</div>
</div>

<script>
const poems = [
  { title: "鹿柴",     content: ["空山不見人","但聞人語響","返景入深林","復照青苔上"] },
  { title: "竹里館",   content: ["獨坐幽篁裡","彈琴復長嘯","深林人不知","明月來相照"] },
  { title: "送別",     content: ["山中相送罷","日暮掩柴扉","春草明年綠","王孫歸不歸"] },
  { title: "相思",     content: ["紅豆生南國","春來發幾枝","願君多采擷","此物最相思"] },
  { title: "雜詩",     content: ["君自故鄉來","應知故鄉事","來日綺窗前","寒梅著花未"] },
  { title: "春曉",     content: ["春眠不覺曉","處處聞啼鳥","夜來風雨聲","花落知多少"] },
  { title: "夜思",     content: ["床前明月光","疑是地上霜","舉頭望明月","低頭思故鄉"] },
  { title: "登鸛雀樓", content: ["白日依山盡","黃河入海流","欲窮千里目","更上一層樓"] },
  { title: "江雪",     content: ["千山鳥飛絕","萬徑人蹤滅","孤舟簑笠翁","獨釣寒江雪"] },
  { title: "登樂遊原", content: ["向晚意不適","驅車登古原","夕陽無限好","只是近黃昏"] },
  { title: "尋隱者不遇",content:["松下問童子","言師採藥去","只在此山中","雲深不知處"] },
  { title: "回鄉偶書", content: ["少小離家老大回","鄉音無改鬢毛摧","兒童相見不相識","笑問客從何處來"] },
  { title: "九月九日憶山東兄弟", content: ["獨在異鄉為異客","每逢佳節倍思親","遙知兄弟登高處","遍插茱萸少一人"] },
  { title: "渭城曲",   content: ["渭城朝雨浥輕塵","客舍青青柳色新","勸君更盡一杯酒","西出陽關無故人"] },
  { title: "出塞",     content: ["秦時明月漢時關","萬里長征人未還","但使龍城飛將在","不教胡馬渡陰山"] },
  { title: "涼州詞",   content: ["葡萄美酒夜光杯","欲飲琵琶馬上催","醉臥沙場君莫笑","古來征戰幾人回"] },
  { title: "楓橋夜泊", content: ["月落烏啼霜滿天","江楓漁火對愁眠","姑蘇城外寒山寺","夜半鐘聲到客船"] },
  { title: "泊秦淮",   content: ["煙籠寒水月籠沙","夜泊秦淮近酒家","商女不知亡國恨","隔江猶唱後庭花"] },
  { title: "夜雨寄北", content: ["君問歸期未有期","巴山夜雨漲秋池","何當共剪西窗燭","卻話巴山夜雨時"] },
  { title: "金縷衣",   content: ["勸君莫惜金縷衣","勸君惜取少年時","花開堪折直須折","莫待無花空折枝"] },
  { title: "登幽州臺歌",content:["前不見古人","後不見來者","念天地之悠悠","獨愴然而涕下"] },
  { title: "春望",     content: ["國破山河在","城春草木深","感時花濺淚","恨別鳥驚心","烽火連三月","家書抵萬金","白頭搔更短","渾欲不勝簪"] },
  { title: "登高",     content: ["風急天高猿嘯哀","渚清沙白鳥飛迴","無邊落木蕭蕭下","不盡長江滾滾來","萬里悲秋常作客","百年多病獨登臺","艱難苦恨繁霜鬢","潦倒新停濁酒杯"] },
  { title: "黃鶴樓",   content: ["昔人已乘黃鶴去","此地空餘黃鶴樓","黃鶴一去不復返","白雲千載空悠悠","晴川歷歷漢陽樹","芳草萋萋鸚鵡洲","日暮鄉關何處是","煙波江上使人愁"] },
  { title: "蜀相",     content: ["丞相祠堂何處尋","錦官城外柏森森","映階碧草自春色","隔葉黃鸝空好音","三顧頻煩天下計","兩朝開濟老臣心","出師未捷身先死","長使英雄淚滿襟"] },
  { title: "山居秋暝", content: ["空山新雨後","天氣晚來秋","明月松間照","清泉石上流","竹喧歸浣女","蓮動下漁舟","隨意春芳歇","王孫自可留"] },
  { title: "無題",     content: ["相見時難別亦難","東風無力百花殘","春蠶到死絲方盡","蠟炬成灰淚始乾","曉鏡但愁雲鬢改","夜吟應覺月光寒","蓬萊此去無多路","青鳥殷勤為探看"] },
];

let currentLevel = parseInt(localStorage.getItem('calligraphyLevel')) || 0;

const bgCanvas   = document.getElementById('bg_canvas');
const drawCanvas = document.getElementById('draw_canvas');
const bgCtx      = bgCanvas.getContext('2d');
const drawCtx    = drawCanvas.getContext('2d');
const stamp      = document.getElementById('stamp');
const loadingOverlay = document.getElementById('loading-overlay');
const loadingMsg     = document.getElementById('loading-msg');
const indicator      = document.getElementById('hand-indicator');

let lastX = 0, lastY = 0, isDrawing = false;
let nextDebounce = false;
let frameCount = 0;

const buttons = [
    { label: '清空', x: 0.08, y: 0.82, w: 110, h: 55, color: '#8b4513', action: clearCanvas },
    { label: '蓋章', x: 0.76, y: 0.82, w: 110, h: 55, color: '#b22222', action: nextLevel }
];

function init() {
    bgCanvas.width  = drawCanvas.width  = window.innerWidth;
    bgCanvas.height = drawCanvas.height = window.innerHeight;

    drawCtx.lineCap     = 'round';
    drawCtx.lineJoin    = 'round';
    drawCtx.strokeStyle = '#1a1a1a';

    updateLevelDisplay();

    // 預覽用攝影機（獨立串流）
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
        .then(stream => {
            document.getElementById('preview_video').srcObject = stream;
        })
        .catch(err => console.warn('預覽攝影機:', err));

    // MediaPipe Hands
    const hands = new Hands({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
    hands.onResults(onResults);

    const videoEl = document.getElementById('input_video');
    const camera  = new Camera(videoEl, {
        onFrame: async () => {
            frameCount++;
            if (frameCount === 1) {
                // 第一幀抵達，確認攝影機正常，關閉遮罩
                loadingOverlay.classList.add('hidden');
            }
            await hands.send({ image: videoEl });
        },
        width: 1280, height: 720
    });

    camera.start().catch(err => {
        loadingMsg.textContent = '⚠️ 攝影機啟動失敗：' + err.message;
        console.error(err);
    });
}

function drawUI() {
    bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

    // 1. 攝影機背景（半透明）
    const vid = document.getElementById('input_video');
    if (vid.readyState >= 2) {
        bgCtx.save();
        bgCtx.globalAlpha = 0.35;
        bgCtx.drawImage(vid, 0, 0, bgCanvas.width, bgCanvas.height);
        bgCtx.restore();
    }

    // 2. 詩句文字
    // game-area 有 scaleX(-1) → canvas 繪製的文字也被翻轉，變成鏡像反字
    // 解法：每個字繪製前 scale(-1,1) 抵消，螢幕上就會正常顯示
    const p = poems[currentLevel % poems.length];
    bgCtx.font         = "bold 88px '標楷體', 'DFKai-SB', '楷體', serif";
    bgCtx.textAlign    = 'center';
    bgCtx.textBaseline = 'middle';

    p.content.forEach((line, i) => {
        const cx = bgCanvas.width / 2;
        const cy = 170 + i * 125;
        bgCtx.save();
        bgCtx.translate(cx, cy);
        bgCtx.scale(-1, 1);
        // 白邊讓文字在任何背景都清晰
        bgCtx.lineWidth   = 5;
        bgCtx.strokeStyle = 'rgba(255,255,255,0.45)';
        bgCtx.strokeText(line, 0, 0);
        bgCtx.fillStyle   = 'rgba(48, 42, 36, 0.65)';
        bgCtx.fillText(line, 0, 0);
        bgCtx.restore();
    });

    // 3. 虛擬按鈕
    buttons.forEach(btn => {
        const bx = btn.x * bgCanvas.width;
        const by = btn.y * bgCanvas.height;
        bgCtx.save();
        bgCtx.translate(bx + btn.w / 2, by + btn.h / 2);
        bgCtx.scale(-1, 1);
        bgCtx.fillStyle = btn.color;
        bgCtx.beginPath();
        if (bgCtx.roundRect) {
            bgCtx.roundRect(-btn.w/2, -btn.h/2, btn.w, btn.h, 12);
        } else {
            bgCtx.rect(-btn.w/2, -btn.h/2, btn.w, btn.h);
        }
        bgCtx.fill();
        bgCtx.fillStyle    = '#fff';
        bgCtx.font         = "bold 22px '標楷體', 'DFKai-SB', serif";
        bgCtx.textAlign    = 'center';
        bgCtx.textBaseline = 'middle';
        bgCtx.fillText(btn.label, 0, 0);
        bgCtx.restore();
    });
}

function onResults(results) {
    drawUI();

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        indicator.textContent = '✍️ 偵測到手';
        indicator.style.color = '#7fff7f';

        const hand      = results.multiHandLandmarks[0];
        const indexTip  = hand[8];
        const indexBase = hand[5];
        const x = indexTip.x * drawCanvas.width;
        const y = indexTip.y * drawCanvas.height;

        buttons.forEach(btn => {
            const bx = btn.x * bgCanvas.width;
            const by = btn.y * bgCanvas.height;
            if (x > bx && x < bx + btn.w && y > by && y < by + btn.h) {
                if (!nextDebounce) btn.action();
            }
        });

        if (indexTip.y < indexBase.y - 0.02) {
            if (!isDrawing) { isDrawing = true; lastX = x; lastY = y; }
            drawStroke(x, y);
        } else {
            isDrawing = false;
        }
    } else {
        isDrawing = false;
        indicator.textContent = '✋ 未偵測到手';
        indicator.style.color = '#ffb347';
    }
}

function drawStroke(x, y) {
    const dist = Math.hypot(x - lastX, y - lastY);
    drawCtx.lineWidth = Math.max(3, 15 - dist * 0.5);
    drawCtx.beginPath();
    drawCtx.moveTo(lastX, lastY);
    drawCtx.lineTo(x, y);
    drawCtx.stroke();
    lastX = x; lastY = y;
}

function clearCanvas() {
    drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
}

function nextLevel() {
    nextDebounce = true;
    stamp.classList.add('active');
    setTimeout(() => {
        stamp.classList.remove('active');
        currentLevel++;
        localStorage.setItem('calligraphyLevel', currentLevel);
        updateLevelDisplay();
        clearCanvas();
        nextDebounce = false;
    }, 1000);
}

function updateLevelDisplay() {
    document.getElementById('levelNum').innerText  = currentLevel + 1;
    document.getElementById('poemTitle').innerText = poems[currentLevel % poems.length].title;
}

window.onload = init;
</script>
</body>
</html>
