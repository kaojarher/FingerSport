    </style>
</head>

    let currentLevel = parseInt(localStorage.getItem('calligraphyLevel')) || 0;
    const bgCanvas = document.getElementById('bg_canvas');
    const drawCanvas = document.getElementById('draw_canvas');
    const bgCtx = bgCanvas.getContext('2d');
    const drawCtx = drawCanvas.getContext('2d');
    const stamp = document.getElementById('stamp');

    let lastX = 0, lastY = 0, isDrawing = false;
    let nextDebounce = false;

    const buttons = [
        { label: '清空', x: 0.1, y: 0.8, w: 100, h: 50, color: '#8b4513', action: clearCanvas },
        { label: '蓋章', x: 0.8, y: 0.8, w: 100, h: 50, color: '#b22222', action: nextLevel }
    ];

    function init() {
        // 設定畫布解析度
        bgCanvas.width = drawCanvas.width = window.innerWidth;
        bgCanvas.height = drawCanvas.height = window.innerHeight;
        
        drawCtx.lineCap = 'round';
        drawCtx.lineJoin = 'round';
        drawCtx.strokeStyle = '#1a1a1a';
        updateLevelDisplay();
        
        // 啟動相機與手勢辨識
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);

        const camera = new Camera(document.getElementById('input_video'), {
            onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); },
            width: 1280, height: 720
        });
        camera.start();
    }

    function drawUI() {
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
        
        // 1. 繪製半透明相機背景
        bgCtx.save();
        bgCtx.globalAlpha = 0.4;
        bgCtx.drawImage(document.getElementById('input_video'), 0, 0, bgCanvas.width, bgCanvas.height);
        bgCtx.restore();

        // 2. 繪製臨摹文字 (核心修復)
        const p = poems[currentLevel % poems.length];
        bgCtx.save();
        bgCtx.textAlign = "center";
        bgCtx.textBaseline = "middle";
        bgCtx.fillStyle = "rgba(0, 0, 0, 0.15)"; // 淺灰色字體方便臨摹
        bgCtx.font = "bold 100px '標楷體'";
        
        p.content.forEach((line, i) => {
            // 計算垂直排列位置
            bgCtx.fillText(line, bgCanvas.width / 2, 200 + i * 140);
        });
        bgCtx.restore();

        // 3. 繪製虛擬按鈕
        buttons.forEach(btn => {
            const bx = btn.x * bgCanvas.width;
            const by = btn.y * bgCanvas.height;
            bgCtx.fillStyle = btn.color;
            bgCtx.roundRect ? bgCtx.fillRoundRect : bgCtx.fillRect(bx, by, btn.w, btn.h);
            bgCtx.fillStyle = "white";
            bgCtx.font = "20px '標楷體'";
            bgCtx.fillText(btn.label, bx + btn.w/2, by + btn.h/2 + 7);
        });
    }

    function onResults(results) {
        drawUI();
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const hand = results.multiHandLandmarks[0];
            const indexTip = hand[8];  // 食指指尖
            const indexBase = hand[5]; // 食指關節
            
            const x = indexTip.x * drawCanvas.width;
            const y = indexTip.y * drawCanvas.height;

            // 檢查按鈕碰撞
            buttons.forEach(btn => {
                const bx = btn.x * bgCanvas.width;
                const by = btn.y * bgCanvas.height;
                if (x > bx && x < bx + btn.w && y > by && y < by + btn.h) {
                    if(!nextDebounce) btn.action();
                }
            });

            // 書寫邏輯：食指高於關節時偵測為「下筆」
            if (indexTip.y < indexBase.y - 0.02) { 
                if (!isDrawing) {
                    isDrawing = true;
                    lastX = x; lastY = y;
                }
                drawStroke(x, y);
            } else {
                isDrawing = false;
            }
        }
    }

    function drawStroke(x, y) {
        const dist = Math.hypot(x - lastX, y - lastY);
        drawCtx.lineWidth = Math.max(3, 15 - dist * 0.5); // 模擬毛筆粗細
        drawCtx.beginPath();
        drawCtx.moveTo(lastX, lastY);
        drawCtx.lineTo(x, y);
        drawCtx.stroke();
        lastX = x; lastY = y;
    }

    function clearCanvas() { drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height); }

    function nextLevel() {
        nextDebounce = true;
        stamp.classList.add('active');
        setTimeout(() => {
            stamp.classList.remove('active');
            currentLevel++;
            localStorage.setItem('calligraphyLevel', currentLevel);
            updateLevelDisplay();
            clearCanvas();
            nextDebounce = false;
        }, 1000);
    }

    function updateLevelDisplay() {
        document.getElementById('levelNum').innerText = currentLevel + 1;
        document.getElementById('poemTitle').innerText = poems[currentLevel % poems.length].title;
    }

    window.onload = init;
</script>
</body>
